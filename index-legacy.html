<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YouTube 轉換器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Noto Sans TC", system-ui, sans-serif;
        padding: 1em;
      }
      input,
      button,
      textarea {
        width: 100%;
        font-size: 1rem;
        margin-top: 0.5em;
        resize: none; /* 隱藏右下角調整手柄，看起來更像 input */
        overflow: hidden; /* 防止出現滾動條影響視覺 */
      }
      .result-block {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 1em;
      }
      .result-block label {
        font-weight: bold;
      }
      .result-block a {
        color: blue;
        text-decoration: underline;
      }
      /* 針對不支援 flex 的舊瀏覽器做簡單修正 */
      .result-block textarea {
        flex-basis: 100%;
        display: block;
        margin-top: 0.2em;
        width: 100%; /* 強制填滿 */
        box-sizing: border-box; /* 防止 padding 撐破寬度 */
      }
      /* 電台模式開關樣式 */
      .radio-option {
        margin-top: 0.5em;
        background: #f0f0f0;
        padding: 1px;
        border-radius: 4px;
        display: block;
        width: 100%;
        text-align: center;
      }
      .radio-option input {
        width: auto;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <h2>YouTube 轉換器</h2>
    <form onsubmit="convert(); return false;">
      <div class="result-block">
        <label>請貼上 YouTube/YouTube Music 連結、頻道ID 或 播放清單ID：</label><br />
        <input id="yt" placeholder="https://www.youtube.com/watch?v=jNQXAC9IVRw" />
        <label class="radio-option"> <input type="checkbox" id="radioMode" />音樂合輯/電台 (RD)</label>
        <input type="submit" value="轉換" />
      </div>
    </form>

    <div id="status" style="font-weight: bold; margin-top: 0.5em"></div>
    <div id="results"></div>

    <hr />
    <div class="result-block">
      <p><strong>切換其他版本：</strong></p>
      <ul>
        <li><a href="index0.html">index0.html（只支援影片，相容舊瀏覽器）</a></li>
        <li><a href="index.html">index.html（功能完整但相容性較低）</a></li>
        <li><a href="index-legacy.html">index-legacy.html（功能完整，相容舊瀏覽器）</a></li>
      </ul>
    </div>

    <script>
      // 1. 環境檢測：是否支援 Fetch (API 用)
      var hasFetch = !!window.fetch;

      // 定義所有服務的設定
      var services = [
        {
          id: "youtube",
          label: "youtube",
          base: "https://yout-ube.com/",
          type: "watch",
          mode: "standard",
        },
        {
          id: "Invidious",
          label: "Invidious",
          base: "https://inv.nadeko.net/",
          type: "watch",
          mode: "standard",
        },
        {
          id: "UAInvidious",
          label: "Invidious (UA)",
          base: "https://invidious.nerdvpn.de/",
          type: "watch",
          mode: "standard",
        },
        {
          id: "DEInvidious",
          label: "Invidious (DE)",
          base: "https://yewtu.be/",
          type: "watch",
          mode: "standard",
        },
        { id: "Poke", label: "Poke", base: "https://poketube.fun/", mode: "Poke" },
        {
          id: "PrivatecoffeePiped",
          label: "Piped",
          base: "https://piped.private.coffee/",
          type: "watch",
          mode: "standard",
        },
        {
          id: "wirewaychPiped",
          label: "Piped",
          base: "https://piped.wireway.ch/",
          type: "watch",
          mode: "standard",
        },
        // 隱藏的項目可以用 hidden: true 標記，或者直接註解掉
        {
          id: "NYCPiped",
          label: "Piped (NYC)",
          base: "https://nyc1.pi.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
        },
        {
          id: "CALPiped",
          label: "Piped (CAL)",
          base: "https://cal1.pi.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
        },
        {
          id: "POLPiped",
          label: "Piped (POL)",
          base: "https://pol1.pi.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
        },
        // mode: "vid_only_allow_param" 表示強制只抓 v，忽略 list 參數但用標準格式
        {
          id: "wirewaychRePiped",
          label: "RePiped",
          base: "https://repiped.wireway.ch/",
          type: "video.html",
          mode: "vid_only",
        },
        {
          id: "wirewaychdevRePiped",
          label: "RePiped (dev)",
          base: "https://repiped-development-c7df8a.onwireway.online/",
          type: "video.html",
          mode: "vid_only",
        },
        {
          id: "duckspartyHyperpipe",
          label: "Hyperpipe",
          base: "https://hyperpipe.ducks.party/",
          type: "watch",
          mode: "standard",
          hidden: true,
          isMusic: true,
        },
        {
          id: "NYCHyperpipe",
          label: "Hyperpipe (NYC)",
          base: "https://nyc1.hp.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
          isMusic: true,
        },
        {
          id: "CALHyperpipe",
          label: "Hyperpipe (CAL)",
          base: "https://cal1.hp.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
          isMusic: true,
        },
        {
          id: "POLHyperpipe",
          label: "Hyperpipe (POL)",
          base: "https://pol1.hp.ggtyler.dev/",
          type: "watch",
          mode: "standard",
          hidden: true,
          isMusic: true,
        },
        { id: "ytify", label: "ytify", base: "https://ytify.pp.ua/", mode: "ytify", isMusic: true },
        {
          id: "ytify2",
          label: "ytify2",
          base: "https://ytify-zeta.vercel.app/",
          mode: "ytify",
          isMusic: true,
        },
        {
          id: "ytifydev",
          label: "ytify (dev)",
          base: "https://dev--ytify.netlify.app/",
          mode: "ytify",
          isMusic: true,
        },
        {
          id: "cinemaphile.com",
          label: "cinemaphile.com",
          base: "https://cinemaphile.com/",
          type: "watch",
          mode: "vid_only",
        },
        {
          id: "m.gjhyss.com",
          label: "m.gjhyss.com",
          base: "https://m.gjhyss.com/",
          type: "share",
          mode: "vid_only",
        },
        {
          id: "NSFW YouTube",
          label: "NSFW YouTube",
          base: "https://www.nsfwyoutube.com/",
          type: "watch",
          mode: "vid_only",
        },
        {
          id: "NSFW YouTube 2",
          label: "NSFW YouTube",
          base: "https://www.nsfwyoutube.com/",
          type: "watchmore",
          mode: "vid_only",
        },
        {
          id: "YouTubeOnLoop",
          label: "YouTubeOnLoop",
          base: "https://www.youtubeonloop.com/",
          type: "watch",
          mode: "vid_only",
        },
        {
          id: "SafeShare",
          label: "SafeShare",
          base: "https://embed.safesha.re/?video_id=",
          mode: "SafeShare",
        },
        {
          id: "AstroTube",
          label: "AstroTube",
          base: "https://at.ggtyler.dev/",
          type: "watch",
          mode: "vid_only",
          hidden: true,
        },
        { id: "YMusic", label: "YMusic", base: "https://ymusicapp.com/", type: "watch", mode: "standard" },
        { id: "shorturl", label: "最短 YouTube", base: "https://youtu.be/", mode: "short" },
        {
          id: "YTMusic",
          label: "YouTube Music",
          base: "https://music.youtube.com/",
          type: "watch",
          mode: "standard",
          isMusic: true,
        },
      ];

      // 初始化 HTML 結構
      var resultsContainer = document.getElementById("results");
      var resultsHtml = "";

      for (var i = 0; i < services.length; i++) {
        var s = services[i];

        resultsHtml +=
          '<div class="result-block"' +
          (s.hidden ? ' style="display:none"' : "") +
          ">" +
          "<label>" +
          s.label +
          " 分享網址：</label>" +
          '<a id="link_' +
          s.id +
          '" href="#" target="_blank" style="display: none;">點我前往' +
          (s.isMusic ? "音樂" : "影片") +
          "</a>" +
          '<textarea id="val_' +
          s.id +
          '" rows="1" readonly></textarea>' +
          "</div>";
      }
      resultsContainer.innerHTML = resultsHtml;

      // 現代 API 救援 (僅在支援 fetch 的環境被呼叫)
      function apiFetch(listId, statusEl, callback) {
        var nodes = ["https://api.piped.private.coffee", "https://pipedapi.wireway.ch"];
        var index = 0;
        function tryNext() {
          if (index >= nodes.length) {
            callback(null);
            return;
          }
          statusEl.innerHTML = "⏳ 正在嘗試遠端解析影片 ID...";
          fetch(nodes[index] + "/playlists/" + listId)
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              var vid = d.relatedStreams && d.relatedStreams[0] ? d.relatedStreams[0].url.split("v=")[1] : null;
              if (vid) callback(vid, nodes[index]);
              else {
                index++;
                tryNext();
              }
            })
            .catch(function () {
              index++;
              tryNext();
            });
        }
        tryNext();
      }

      function convert() {
        var inputEl = document.getElementById("yt"),
          statusEl = document.getElementById("status");
        var rawInput = inputEl.value;
        var input = decodeURIComponent(rawInput.replace(/^\s+|\s+$/g, ""));
        var radioMode = document.getElementById("radioMode").checked;
        var vid = null,
          list = null;

        statusEl.innerHTML = "";
        statusEl.style.color = "#d32f2f";

        // A. 本地解析 (所有瀏覽器通用)
        if (input.indexOf("http") !== 0 && input.indexOf(".") === -1) {
          // 處理純 ID
          if (input.indexOf("UC") === 0) {
            list = "UU" + input.substring(2);
            statusEl.innerHTML = "✅ 頻道 ID 已轉為播放清單";
          } else if (/^(UU|PL|OL|RD)/.test(input)) list = input;
          else if (input.length === 11) vid = input;
        } else {
          // 1. 一般影片/Shorts/Live
          var vM = input.match(/(?:v=|\/v\/|\/shorts\/|\/live\/|\/)([0-9A-Za-z_-]{11})/);
          if (vM) vid = vM[1];
          // 2. 播放清單 ID
          var lM = input.match(/[?&]list=([A-Za-z0-9_-]+)/);
          if (lM) list = lM[1];
          // 3. 短網址
          var sM = input.match(/youtu\.be\/([0-9A-Za-z_-]{11})/);
          if (sM) vid = sM[1];
          // 4. 頻道轉清單
          var cM = input.match(/\/channel\/(UC[0-9A-Za-z_-]+)/);
          if (cM) list = "UU" + cM[1].substring(2);
        }

        // 防誤判：如果影片 ID 抓到的是頻道開頭，則清除它
        if (vid && vid.indexOf("UC") === 0) vid = null;

        // B. 救援與渲染結果
        function render() {
          for (var j = 0; j < services.length; j++) {
            var s = services[j],
              url = null,
              error = false;
            // 優先判斷電台模式
            if (radioMode && vid && s.mode !== "vid_only" && s.mode !== "SafeShare") {
              if (s.mode === "short") url = s.base + vid + "?list=RD" + vid + "&start_radio=1";
              else if (s.mode === "ytify") url = s.base + "?playlist=RD" + vid;
              else if (s.mode === "Poke") url = s.base + "playlist?list=RD" + vid;
              else url = s.base + s.type + "?v=" + vid + "&list=RD" + vid;
            } else {
              if (s.mode === "standard") {
                // 支援 v 和 list
                if (vid && list) url = s.base + s.type + "?v=" + vid + "&list=" + list;
                else if (vid) url = s.base + s.type + "?v=" + vid;
                else if (list) url = s.base + "playlist?list=" + list;
                else error = true;
              } else if (s.mode === "vid_only") {
                // 簡單接在後面，不支援 list
                if (vid) url = s.base + s.type + "?v=" + vid;
                else error = true;
              } else if (s.mode === "SafeShare") {
                // 強制用 title (像 SafeShare)
                if (vid) url = s.base + vid + "&title=flNVp8Gw1gTmgTXpcnCGe%2B59%2Bumywx39TXa6068%3D";
                else error = true; // 有 list 無 vid 也算錯誤
              } else if (s.mode === "ytify") {
                if (list) url = s.base + "?playlist=" + list;
                else if (vid) url = s.base + "?s=" + vid;
                else error = true;
              } else if (s.mode === "Poke") {
                if (list) url = s.base + "playlist?list=" + list;
                else if (vid) url = s.base + "watch?v=" + vid;
                else error = true;
              } else if (s.mode === "short") {
                if (vid) url = s.base + vid + (list ? "?list=" + list : "");
                else if (list) url = "https://youtube.com/playlist?list=" + list;
                else error = true;
              }
            }
            var valEl = document.getElementById("val_" + s.id),
              linkEl = document.getElementById("link_" + s.id);
            if (url) {
              valEl.value = url;
              linkEl.href = url;
              linkEl.style.display = "inline";
              // 關鍵修正：將網址重新顯示在連結文字中，並處理 IE8 innerText 相容性
              if ("textContent" in linkEl) {
                linkEl.textContent = url;
              } else {
                linkEl.innerText = url;
              }
            } else {
              valEl.value = !vid && !list ? "⚠️ 無法辨識影片或播放清單 ID" : "⚠️ 無法產生連結";
              linkEl.style.display = "none";
            }
          }
        }

        // C. 決策路徑
        if (!vid && list) {
          // 1. RD 邏輯還原 (不限瀏覽器，不需要 API 也能抓第一部片)
          if (list.indexOf("RD") === 0 && list.length === 13) {
            vid = list.substring(2);
            statusEl.innerHTML = "✅ RD 邏輯還原成功";
            statusEl.style.color = "#2e7d32";
            render();
          }
          // 2. 現代 API 救援 (需支援 Fetch)
          else if (hasFetch) {
            apiFetch(list, statusEl, function (foundVid, node) {
              if (foundVid) {
                vid = foundVid;
                statusEl.innerHTML = "✅ API 救援成功 (來源: " + node.split("//")[1] + ")";
                statusEl.style.color = "#2e7d32";
              } else {
                statusEl.innerHTML = "⚠️ API 未能取得影片 ID，顯示純清單連結";
              }
              render();
            });
          }
          // 3. 舊瀏覽器退路
          else {
            statusEl.innerHTML = "ℹ️ 此瀏覽器不支援 API 救援，顯示純清單連結";
            render();
          }
        } else {
          if (vid || list) {
            statusEl.innerHTML = "✅ 轉換完成";
            statusEl.style.color = "#2e7d32";
          }
          render();
        }
      }
    </script>
  </body>
</html>
